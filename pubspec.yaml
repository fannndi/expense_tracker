name: student_expense_tracker
description: A personal expense tracker for university students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Storage
  path_provider: ^2.1.5
  
  # Charts
  fl_chart: ^0.70.2

  # PDF & Sharing
  pdf: ^3.11.1
  printing: ^5.14.2
  share_plus: ^10.1.4

  # Auto-fill scheduling
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
